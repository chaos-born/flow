targets:
    $default:
        builders:
            graphql_codegen:
                generate_for:
                    - lib/graphql/*.graphql
                    - lib/graphql/*.graphqls
                options:
                    clients:
                        - graphql
                    addTypename: false
                    allowMissingNullableKeysInFromJson: true
                    assetsPath: "lib/graphql/*{.graphql,.graphqls}"
                    generatedFileHeader: "// GENERATED CODE - DO NOT MODIFY BY HAND\n// ignore_for_file: type=lint\n"
                    outputDirectory: "."
                    scalars:
                        Cursor:
                            type: String
                        JSON:
                            type: Map<String, dynamic>
                        Time:
                            type: String
