query ChallengeConditions(
    $extensionID: ID!
    $extensionVersion: String
    $conditionOwnerID: ID!
    $conditionsAfter: Cursor
) {
    extension(id: $extensionID, version: $extensionVersion) {
        challengeConditions(after: $conditionsAfter,
        input:{
            conditionOwnerID: $conditionOwnerID,
            state: ACTIVE
        })
        {
          pageInfo{
            hasNextPage
            hasPreviousPage
          }
          edges{
            node {
              id
              name
              state
              createdAt
              timeoutAt
              updatedAt
              participantSummary {
                pending {
                  total
                  effects {
                    useBits {
                      totalBitsAmount
                    }
                  }
                }
                satisfied {
                  total
                  effects {
                    useBits {
                      totalBitsAmount
                    }
                  }
                }
              }
            }
            cursor
          }
        }
      }
    }
