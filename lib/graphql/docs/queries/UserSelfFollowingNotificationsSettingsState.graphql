#import "../fragments/FollowEdgeNotificationSettingsFragment.graphql"

query UserSelfFollowingNotificationsSettingsState ($channelLogin: String!) {
  user(login: $channelLogin) {
    id
    self {
      follower {
        notificationSettings {
          ...FollowEdgeNotificationSettingsFragment
        }
      }
    }
  }
}
