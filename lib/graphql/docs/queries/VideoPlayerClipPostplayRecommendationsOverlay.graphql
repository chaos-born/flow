#import "../fragments/RecommendedPostplayBroadcaster.graphql"
#import "../fragments/RecommendedPostplayGame.graphql"
#import "../fragments/RecommendedPostplayVideo.graphql"
#import "../fragments/RecommendedRelatedClips.graphql"

query VideoPlayerClipPostplayRecommendationsOverlay ($slug: ID!) {
  clip(slug: $slug) {
    id
    durationSeconds
    slug
    videoOffsetSeconds
    broadcaster {
      ...RecommendedPostplayBroadcaster
    }
    game {
      ...RecommendedPostplayGame
    }
    relatedClips {
      ...RecommendedRelatedClips
    }
    video {
      ...RecommendedPostplayVideo
    }
  }
}
