query PayoutOnboardingAgreement_CurrentUser ($withAgreement: Boolean!) {
  currentUser {
    id
    roles {
      isPartner
    }
    payoutPlans {
      category
      isReceivingRevenue
      tags
    }
    programAgreement(invitationType: PAYOUT) @include(if: $withAgreement) {
      type
      version
      body
      language
    }
    onboardingInvitations {
      payout {
        id
        isLegacy
        workflow {
          id
          registration {
            birthdate
            city
            companyName
            countryCode
            email
            firstName
            lastName
            middleName
            postal
            stateCode
            streetAddress
            streetAddress2
            parentName
            parentEmail
          }
        }
      }
    }
  }
}
