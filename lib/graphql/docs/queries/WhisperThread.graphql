query WhisperThread ($id: ID!) {
  whisperThread(id: $id) {
    id
    userLastMessageRead {
      id
      sentAt
      __typename
    }
    unreadMessagesCount
    messages(first: 20) {
      edges {
        cursor
        node {
          id
          nonce
          content {
            content
            emotes {
              id
              emoteID
              setID
              from
              to
              __typename
            }
            __typename
          }
          from {
            id
          }
          sentAt
          editedAt
          deletedAt
          __typename
        }
        __typename
      }
      __typename
    }
    __typename
  }
}
