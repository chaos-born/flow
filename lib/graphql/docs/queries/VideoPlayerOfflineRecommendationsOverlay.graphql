#import "../fragments/VideoPlayerOfflineRecommendationsOverlayVideo.graphql"

query VideoPlayerOfflineRecommendationsOverlay ($login: String!) {
  user(login: $login) {
    id
    videos(first: 30) {
      edges {
        node {
          ...VideoPlayerOfflineRecommendationsOverlayVideo
        }
      }
    }
  }
}
