query FeedInteractionHook_GetClipBySlug ($slug: ID!) {
  clip(slug: $slug) {
    id
    slug
    title
    viewCount
    language
    durationSeconds
    thumbnailURL(width: 480, height: 272)
    broadcaster {
      id
      login
      displayName
    }
    game {
      id
      name
      displayName
      categorySlug: slug
    }
  }
}
