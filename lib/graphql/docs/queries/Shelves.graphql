#import "../fragments/Shelf.graphql"

query Shelves ($requestID: String!, $platform: String!, $langWeightedCCU: Boolean, $limit: Int, $after: Cursor, $itemsPerRow: Int, $context: RecommendationsContext, $imageWidth: Int = 50, $verbose: Boolean, $includeCostreaming: Boolean!) {
  shelves(requestID: $requestID, platform: $platform, langWeightedCCU: $langWeightedCCU, first: $limit, after: $after, itemsPerRow: $itemsPerRow, context: $context, verbose: $verbose) {
    edges {
      node {
        ...Shelf
      }
      cursor
    }
    pageInfo {
      hasNextPage
    }
    verboseResults
  }
}
