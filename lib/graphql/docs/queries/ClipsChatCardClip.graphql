query ClipsChatCard_Clip ($slug: ID!) {
  clip(slug: $slug) {
    id
    title
    slug
    url
    isAutoCurated
    curator {
      id
      displayName
    }
    broadcaster {
      id
      displayName
    }
    assets {
      id
      thumbnailURL(height: 272)
      aspectRatio
      type
    }
  }
}
