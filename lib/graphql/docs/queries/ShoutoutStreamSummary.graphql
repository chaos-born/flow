#import "../fragments/ShoutoutClipFragment.graphql"

query ShoutoutStreamSummary ($login: String!, $first: Int!) {
  user(login: $login) {
    id
    streamSummaries(first: $first) {
      startedAt
      clips(first: 5) {
        edges {
          node {
            ...ShoutoutClipFragment
          }
        }
      }
    }
  }
}
