query DVRAvailabilityQuery ($channelLogin: String, $isPremiumEventsEnabled: Boolean!) {
  user(login: $channelLogin) {
    id
    roles {
      isPartner
      isAffiliate
    }
    self {
      subscriptionBenefit {
        id
        product {
          id
          hasAdFree
        }
      }
    }
    channel @include(if: $isPremiumEventsEnabled) {
      id
      activePremiumEvent {
        id
        isDvrEligible
      }
    }
  }
  currentUser {
    id
    turboStatus {
      hasActiveTurbo
    }
  }
}
