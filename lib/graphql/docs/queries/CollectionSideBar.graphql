query CollectionSideBar ($collectionID: ID!) {
  collection(id: $collectionID) {
    id
    title
    lengthSeconds
    owner {
      id
      displayName
      login
      profileURL
    }
    items(first: 200) {
      totalCount
      edges {
        node {
          __typename
          ... on Video {
            id
            title
            lengthSeconds
            previewThumbnailURL(width: 80, height: 45)
          }
        }
      }
    }
  }
}
