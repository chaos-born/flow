#import "../fragments/SubProductOfferFragment.graphql"
#import "../fragments/SubSummary.graphql"

query EmoteCard ($emoteID: ID!, $artistEnabled: Boolean!) {
  emote(id: $emoteID) {
    id
    type
    subscriptionTier
    token
    setID
    artist @include(if: $artistEnabled) {
      id
      login
      displayName
    }
    owner {
      id
      login
      displayName
      channel {
        id
        localEmoteSets {
          id
          emotes {
            id
            token
          }
        }
      }
      stream {
        id
        type
      }
      self {
        follower {
          followedAt
        }
        subscriptionBenefit {
          id
          tier
        }
      }
      subscriptionProducts {
        id
        displayName
        tier
        name
        url
        offers {
          ...SubProductOfferFragment
        }
        emotes {
          id
          token
        }
      }
    }
    subscriptionSummaries {
      ...SubSummary
    }
    bitsBadgeTierSummary {
      threshold
      self {
        isUnlocked
        numberOfBitsUntilUnlock
      }
    }
  }
}
