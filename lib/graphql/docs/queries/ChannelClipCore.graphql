#import "../fragments/CoreChannelFragment.graphql"
#import "../fragments/GuestStarUser.graphql"

query ChannelClipCore ($clipSlug: ID!) {
  clip(slug: $clipSlug) {
    id
    videoOffsetSeconds
    broadcaster {
      ...CoreChannelFragment
    }
    isFeatured
    isAutoCurated
    guestStarParticipants {
      guests {
        ...GuestStarUser
      }
      sessionIdentifier
    }
  }
}
