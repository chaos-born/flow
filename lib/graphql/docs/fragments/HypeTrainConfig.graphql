#import "./HypeTrainCalloutEmote.graphql"
#import "./HypeTrainConductorReward.graphql"
#import "./HypeTrainParticipationConversionRate.graphql"
#import "./HypeTrainPotentialReward.graphql"

fragment HypeTrainConfig on HypeTrainConfig {
  id
  difficulty
  difficultySettings {
    difficulty
    maxLevel
  }
  conductorRewards {
    ...HypeTrainConductorReward
  }
  participationConversionRates {
    ...HypeTrainParticipationConversionRate
  }
  calloutEmote {
    ...HypeTrainCalloutEmote
  }
  willUseCreatorColor
  primaryHexColor
  potentialRewards {
    ...HypeTrainPotentialReward
  }
  kickoff {
    minPoints
  }
}
