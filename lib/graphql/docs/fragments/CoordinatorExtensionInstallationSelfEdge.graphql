#import "./CoordinatorExtension.graphql"

fragment CoordinatorExtensionInstallationSelfEdge on ExtensionInstallationSelfEdge {
  installation {
    id
    extension {
      ...CoordinatorExtension
    }
    abilities {
      isChatEnabled
      isBitsEnabled
      isSubscriptionStatusAvailable
    }
    activationConfig {
      anchor
      slot
      state
      x
      y
    }
    self {
      canActivate
    }
  }
  token {
    extensionID
    jwt
  }
  helixToken {
    extensionID
    jwt
  }
  configuration {
    extensionID
    broadcaster {
      version
      content
    }
    developer {
      version
      content
    }
    global {
      version
      content
    }
  }
  issuedAt
}
