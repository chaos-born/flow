fragment StreamLabsAlert on ActivityFeedStreamLabsAlert {
  streamLabsType: type
  data {
    ... on StreamLabsTipData {
      thirdPartyHandle
      message
      money {
        amount
        currencyCode
        minorUnits
      }
    }
    ... on StreamLabsMediaData {
      thirdPartyHandle
      itemName
      message
      money {
        amount
        currencyCode
        minorUnits
      }
    }
    ... on StreamLabsMerchData {
      thirdPartyHandle
      itemName
      message
    }
    ... on StreamLabsCharityDonationData {
      thirdPartyHandle
      message
      charityName
      money {
        amount
        currencyCode
        minorUnits
      }
    }
  }
}
