#import "./StoryBaseLayerDataBlockFragment.graphql"
#import "./StoryInteractiveLayerDateBlockFragment.graphql"
#import "./StoryTextTokenFragment.graphql"

fragment StoryContentFragment on StoryContent {
  caption {
    ...StoryTextTokenFragment
  }
  interactiveLayers {
    ...StoryInteractiveLayerDateBlockFragment
  }
  baseLayer {
    ...StoryBaseLayerDataBlockFragment
  }
  thumbnailAssetURL
  flattenedAsset {
    id
    thumbnailURL
    renditions {
      url
      width
      height
    }
  }
}
