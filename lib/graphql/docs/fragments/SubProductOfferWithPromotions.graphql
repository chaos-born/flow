#import "./Money.graphql"

fragment SubProductOfferWithPromotions on Offer {
  id
  tplr
  platform
  eligibility {
    benefitsStartAt
    isEligible
  }
  tagBindings {
    key
    value
  }
  giftType
  listing {
    chargeModel {
      internal {
        previewPrice {
          id
          currency
          exponent
          price
          total
          discount {
            price
            total
          }
        }
        plan {
          interval {
            duration
            unit
          }
          renewalPolicy
        }
      }
    }
  }
  promotion {
    id
    name
    promoDisplay {
      discountPercent
      discountPrices {
        ...Money
      }
      discountType
    }
    eligibilityFilters {
      value
    }
    priority
    promoType
    endAt
  }
  promotions {
    id
    name
    promoDisplay {
      discountPercent
      discountPrices {
        ...Money
      }
      discountType
    }
    eligibilityFilters {
      value
    }
    priority
    promoType
    endAt
    quantity {
      min
      max
    }
  }
  quantity {
    min
    max
  }
}
