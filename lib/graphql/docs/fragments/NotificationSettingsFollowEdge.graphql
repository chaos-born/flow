#import "./FollowEdgeNotificationSettingsFragment.graphql"

fragment NotificationSettingsFollowEdge on FollowEdge {
  cursor
  followedAt
  notificationSettings {
    ...FollowEdgeNotificationSettingsFragment
  }
  node {
    id
    displayName
    profileImageURL(width: 70)
    login
    followers {
      totalCount
    }
    roles {
      isPartner
    }
  }
}
