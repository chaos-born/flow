#import "./AdRequestBroadcaster.graphql"
#import "./AdRequestContentLabel.graphql"
#import "./AdRequestGame.graphql"
#import "./AdRequestTag.graphql"

fragment AdRequestVOD on Video {
  id
  lengthSeconds
  broadcastType
  title
  game {
    ...AdRequestGame
  }
  owner {
    ...AdRequestBroadcaster
  }
  contentTags {
    ...AdRequestTag
  }
  contentClassificationLabels {
    ...AdRequestContentLabel
  }
}
