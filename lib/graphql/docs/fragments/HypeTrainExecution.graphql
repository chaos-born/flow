#import "./HypeTrainCompleted.graphql"
#import "./HypeTrainConductor.graphql"
#import "./HypeTrainConfig.graphql"
#import "./HypeTrainProgress.graphql"
#import "./SharedHypeTrainDetails.graphql"
#import "./TreasureTrainDetails.graphql"
#import "./VariantTrainDetails.graphql"

fragment HypeTrainExecution on HypeTrainExecution {
  id
  startedAt
  expiresAt
  updatedAt
  endedAt
  endReason
  progress {
    ...HypeTrainProgress
  }
  conductors {
    ...HypeTrainConductor
  }
  config {
    ...HypeTrainConfig
  }
  allTimeHigh {
    ...HypeTrainCompleted
  }
  participations {
    action
    quantity
    source
  }
  sharedHypeTrainDetails {
    ...SharedHypeTrainDetails
  }
  isGoldenKappaTrain
  isFastMode
  isTreasureTrain
  treasureTrainDetails {
    ...TreasureTrainDetails
  }
  variantTrainDetails {
    ...VariantTrainDetails
  }
  self {
    isEligibleForRewards
  }
}
