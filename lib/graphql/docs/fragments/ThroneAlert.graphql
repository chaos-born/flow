fragment ThroneAlert on ActivityFeedThroneAlert {
  throneType: type
  data {
    ... on ThroneGiftData {
      type
      thirdPartyHandle
      message
      itemName
      link
    }
    ... on ThroneContributionPurchasedData {
      thirdPartyHandle
      itemName
      money {
        amount
        currencyCode
        minorUnits
      }
      link
    }
    ... on ThroneBadgeEarnedData {
      itemName
      itemDescription
      link
    }
  }
}
