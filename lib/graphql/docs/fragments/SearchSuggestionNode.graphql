fragment SearchSuggestionNode on SearchSuggestionEdge {
  node {
    content {
      __typename
      ... on SearchSuggestionChannel {
        id
        isLive
        isVerified
        login
        profileImageURL(width: 50)
        user {
          id
          roles {
            isParticipatingDJ
          }
          stream {
            id
            viewersCount
            game {
              id
              displayName
            }
            broadcaster {
              id
              broadcastSettings {
                id
                title
              }
            }
          }
        }
      }
      ... on SearchSuggestionCategory {
        id
        boxArtURL(width: 60, height: 80)
        game {
          id
          slug
        }
      }
      ... on SearchSuggestionCollection {
        id
        slug
      }
    }
    matchingCharacters {
      start
      end
    }
    id
    text
  }
}
