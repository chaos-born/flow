#import "./StoryInteractiveUserFragment.graphql"
#import "./StoryLayerPlacementFragment.graphql"

fragment StoryBaseLayerDataBlockFragment on StoryBaseLayerDataBlock {
  ... on StoryClipBlock {
    clip {
      id
      slug
      isAutoCurated
      broadcastIdentifier {
        id
      }
      broadcaster {
        id
        displayName
        login
      }
      video {
        id
      }
      game {
        id
        displayName
        slug
      }
    }
    zoomOption
    clipAsset {
      id
    }
  }
  ... on StoryGradientBackgroundBlock {
    colors
    direction
    assetURL
  }
  ... on StoryImageBackgroundBlock {
    assetURL
  }
  ... on StoryTwitchImageBackgroundBlock {
    assetkey
    assetURL
  }
  ... on StoryReshareBackgroundBlock {
    placement {
      ...StoryLayerPlacementFragment
    }
    user {
      ...StoryInteractiveUserFragment
    }
  }
}
