#import "./ClipAssetFragment.graphql"

fragment CreatorMessageFragment on CreatorMessage {
  id
  creator {
    id
    login
    displayName
    profileImageURL(width: 50)
  }
  body {
    ... on StoryPlainTextToken {
      plainText
    }
    ... on StoryEmoteToken {
      id
      emoteCode
    }
  }
  sentAt
  cohortType
  lastSeenAt
  clips {
    id
    slug
    title
    viewCount
    assets {
      ...ClipAssetFragment
    }
    url
    curator {
      id
      displayName
    }
  }
}
