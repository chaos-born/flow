#import "./ActivityFeedCheermote.graphql"
#import "./ActivityFeedEmote.graphql"
#import "./ActivityFeedUser.graphql"

fragment ActivityFeedTokens on ActivityFeedText {
  fragments {
    token {
      ... on ActivityFeedTextToken {
        text
      }
      ... on ActivityFeedIntegerToken {
        number
      }
      ... on ActivityFeedPercentToken {
        percent
      }
      ... on User {
        ...ActivityFeedUser
      }
      ... on Emote {
        ...ActivityFeedEmote
      }
      ...ActivityFeedCheermote
      ... on UserDoesNotExist {
        key
      }
      ... on UserError {
        key
      }
    }
    hasEmphasis
  }
}
