#import "./AlertMessageContent.graphql"

fragment BitsSpendFeatureData on BitsSpendAlertData {
  ... on BitsSpendCheerData {
    messageContent {
      ...AlertMessageContent
    }
    isFirstTimeCheer
  }
  ... on BitsSpendAutomaticPowerUpData {
    messageContent {
      ...AlertMessageContent
    }
    reward {
      powerUpType
    }
  }
  ... on BitsSpendCustomPowerUpData {
    messageContent {
      ...AlertMessageContent
    }
    reward {
      id
      title
    }
  }
}
