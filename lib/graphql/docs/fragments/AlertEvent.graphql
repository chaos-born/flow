#import "./ActivityFeedUser.graphql"
#import "./AlertMessageContent.graphql"
#import "./BitsSpendFeatureData.graphql"
#import "./CrowdControlAlert.graphql"
#import "./StreamElementsAlert.graphql"
#import "./StreamLabsAlert.graphql"
#import "./ThroneAlert.graphql"

fragment AlertEvent on ActivityFeedAlert {
  __typename
  id
  status
  createdAt
  updatedAt
  testVariant
  ... on ActivityFeedCheerAlert {
    cheerer {
      ...ActivityFeedUser
    }
    amount
    isAnonymous
    isFirstTimeCheer
    messageContent {
      ...AlertMessageContent
    }
  }
  ... on ActivityFeedBitsSpendAlert {
    fromUser {
      ...ActivityFeedUser
    }
    bitsAmount
    featureType
    featureData {
      ...BitsSpendFeatureData
    }
  }
  ... on ActivityFeedCommunityGiftSubscriptionAlert {
    gifter {
      ...ActivityFeedUser
    }
    isAnonymous
    quantity
    multiMonthDuration
    tier
    totalGiftCount
  }
  ... on ActivityFeedPaidUpgradeSubscriptionAlert {
    subscriber {
      ...ActivityFeedUser
    }
    tier
    paidUpgradeType
  }
  ... on ActivityFeedFollowAlert {
    follower {
      ...ActivityFeedUser
    }
  }
  ... on ActivityFeedHostAlert {
    host {
      ...ActivityFeedUser
    }
    viewerCount
    isAutoHost
  }
  ... on ActivityFeedIndividualGiftSubscriptionAlert {
    gifter {
      ...ActivityFeedUser
    }
    recipient {
      ...ActivityFeedUser
    }
    isAnonymous
    multiMonthDuration
    tier
    totalGiftCount
  }
  ... on ActivityFeedPrimeResubscriptionAlert {
    subscriber {
      ...ActivityFeedUser
    }
    totalDuration
    messageContent {
      ...AlertMessageContent
    }
    viewerCustomizationSelection {
      alertSetID
      viewerCustomizationID
      image {
        assetMimeType
        assetType
        id
        url
        volume
      }
      sound {
        assetMimeType
        assetType
        id
        isMuted
        name
        url
        volume
      }
    }
  }
  ... on ActivityFeedPrimeSubscriptionAlert {
    subscriber {
      ...ActivityFeedUser
    }
  }
  ... on ActivityFeedRaidAlert {
    raider {
      ...ActivityFeedUser
    }
    partySize
  }
  ... on ActivityFeedSubscriptionAlert {
    subscriber {
      ...ActivityFeedUser
    }
    multiMonthDuration
    tier
  }
  ... on ActivityFeedResubscriptionAlert {
    subscriber {
      ...ActivityFeedUser
    }
    multiMonthDuration
    isMultiMonthResub
    streakDuration
    totalDuration
    messageContent {
      ...AlertMessageContent
    }
    tier
    viewerCustomizationSelection {
      alertSetID
      viewerCustomizationID
      image {
        id
        url
        volume
        assetType
        assetMimeType
      }
      sound {
        id
        url
        volume
        isMuted
        assetType
        assetMimeType
        name
      }
    }
  }
  ... on ActivityFeedCreatorGoalAlert {
    goalState
    goalType
    description
    contributions {
      ... on ChannelGoalIntegerContributions {
        currentIntegerContributions: currentContributions
        targetIntegerContributions: targetContributions
      }
      ... on ChannelGoalMoneyContributions {
        currentMoneyContributions: currentContributions {
          amount
          currencyCode
          minorUnits
        }
        targetMoneyContributions: targetContributions {
          amount
          currencyCode
          minorUnits
        }
      }
    }
  }
  ... on ActivityFeedCharityDonationAlert {
    donor {
      ...ActivityFeedUser
    }
    charityName
    money {
      amount
      currencyCode
      minorUnits
    }
  }
  ... on ActivityFeedChannelPointsRedemptionAlert {
    pointsSpent
    messageContent {
      ...AlertMessageContent
    }
    redeemer {
      ...ActivityFeedUser
    }
    reward {
      id
      title
    }
  }
  ... on ActivityFeedHypeTrainAlert {
    level
    allTimeHighLevel
    isAllTimeHighLevel
    hypeTrainState
  }
  ... on ActivityFeedCombosAlert {
    level
    combosState
  }
  ... on ActivityFeedCrowdControlAlert {
    ...CrowdControlAlert
  }
  ... on ActivityFeedStreamElementsAlert {
    ...StreamElementsAlert
  }
  ... on ActivityFeedStreamLabsAlert {
    ...StreamLabsAlert
  }
  ... on ActivityFeedThroneAlert {
    ...ThroneAlert
  }
}
