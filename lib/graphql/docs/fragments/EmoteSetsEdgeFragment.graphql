fragment EmoteSetsEdgeFragment on EmoteSetsEdge {
  cursor
  node {
    id
    emotes {
      id
      setID
      token
      modifiers {
        code
        name
      }
      type
      assetType
    }
    owner @include(if: $withOwner) {
      id
      login
      displayName
      profileImageURL(width: 28)
    }
  }
}
