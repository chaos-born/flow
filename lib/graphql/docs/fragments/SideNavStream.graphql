#import "./CostreamingUserWithViewcount.graphql"
#import "./FreeformTagFragment.graphql"
#import "./SideNavUser.graphql"

fragment SideNavStream on Stream {
  id
  broadcaster {
    ...SideNavUser
  }
  collaborationViewersCount
  viewersCount
  game {
    id
    slug
    displayName
    name
  }
  type
  hasHypeTrain
  freeformTags @include(if: $withFreeformTags) {
    ...FreeformTagFragment
  }
  costreamDetails {
    costreamersCount
    organizer {
      ...CostreamingUserWithViewcount
    }
    role
    topCostreamers {
      ...CostreamingUserWithViewcount
    }
    totalViewersCount
  }
}
