#import "./ClipAssetFragment.graphql"
#import "./PortraitClipCropping.graphql"

fragment ContentClipsManagerClip on Clip {
  id
  slug
  url
  isAutoCurated
  embedURL
  title
  viewCount
  language
  isFeatured
  assets {
    ...ClipAssetFragment
  }
  curator {
    id
    login
    displayName
    profileImageURL(width: 70)
  }
  game {
    id
    name
    boxArtURL(width: 52, height: 72)
    displayName
    slug
  }
  broadcast {
    id
    title
  }
  broadcaster {
    id
    login
    displayName
    primaryColorHex
    isPartner
    profileImageURL(width: 70)
    followers {
      totalCount
    }
    stream {
      id
      viewersCount
    }
    lastBroadcast {
      id
      startedAt
    }
    self {
      isEditor
    }
  }
  thumbnailURL
  createdAt
  isFeatured
  hasCaptions
  isPublished
  duration
  durationSeconds
  champBadge {
    id
  }
  playbackAccessToken(params: { platform: "web", playerType: "clips-download" }) {
    signature
    value
  }
  video {
    id
    broadcastType
    title
  }
  videoOffsetSeconds
  videoQualities {
    sourceURL
  }
  isViewerEditRestricted
  suggestedCropping {
    ...PortraitClipCropping
  }
  rawMediaRelativeOffset
  rawMediaKey
}
