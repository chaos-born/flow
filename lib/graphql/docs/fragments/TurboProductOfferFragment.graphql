fragment TurboProductOfferFragment on Offer {
  id
  eligibility {
    benefitsEndAt
    benefitsStartAt
    isEligible
  }
  listing {
    chargeModel {
      internal {
        previewPrice {
          id
          currency
          exponent
          total
          discount {
            total
          }
        }
      }
    }
  }
  promotion {
    id
    name
    promoDisplay {
      discountPercent
      discountType
    }
    eligibilityFilters {
      value
    }
    priority
    promoType
    endAt
  }
  tagBindings {
    key
    value
  }
  tplr
}
