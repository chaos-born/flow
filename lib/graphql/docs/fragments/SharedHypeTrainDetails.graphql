#import "./HypeTrainCompleted.graphql"
#import "./HypeTrainConductor.graphql"
#import "./SharedHypeTrainChannel.graphql"
#import "./SharedHypeTrainProgress.graphql"

fragment SharedHypeTrainDetails on SharedHypeTrainDetails {
  id
  sharedConductors {
    user {
      id
    }
    conductors {
      ...HypeTrainConductor
    }
  }
  sharedProgress {
    user {
      ...SharedHypeTrainChannel
    }
    channelProgress {
      ...SharedHypeTrainProgress
    }
  }
  sharedAllTimeHighRecords {
    user {
      id
    }
    channelAllTimeHigh {
      ...HypeTrainCompleted
    }
  }
}
