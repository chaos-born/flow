#import "./ThreadListItemSpamInfo.graphql"
#import "./WhisperThreadsMessageEdge.graphql"

fragment CurrentUserWhisperThreadsNode on WhisperThread {
  id
  participants {
    id
    chatColor
    displayName
    profileImageURL(width: 70)
    login
    __typename
  }
  spamInfo {
    ...ThreadListItemSpamInfo
  }
  messages(first: 20) {
    edges {
      ...WhisperThreadsMessageEdge
    }
    __typename
  }
  userLastMessageRead {
    id
    sentAt
    __typename
  }
  isMuted
  isArchived
  unreadMessagesCount
  __typename
}
