#import "./CostreamingDiscoveryDetails.graphql"
#import "./CuratedTagFragment.graphql"
#import "./FreeformTagFragment.graphql"
#import "./Game.graphql"
#import "./User.graphql"

fragment Stream on Stream {
  id
  broadcaster {
    ...User
  }
  game {
    ...Game
  }
  freeformTags {
    ...FreeformTagFragment
  }
  curatedTags {
    ...CuratedTagFragment
  }
  viewersCount
  previewImageURL(width: 640, height: 360)
  verticalPreviewImageURL: previewImageURL(width: 360, height: 640)
  height
  width
  isDualFormat
  createdAt
  type
  contentClassificationLabels {
    id
  }
  costreamDetails @include(if: $includeCostreaming) {
    ...CostreamingDiscoveryDetails
  }
}
