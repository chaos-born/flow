fragment SideNavTitle on ShelfTitle {
  fallbackLocalizedTitle
  key
  localizedTitleTokens {
    node {
      ... on TextToken {
        text
      }
      ... on User {
        id
        login
        displayName
      }
      ... on Tag {
        id
      }
      ... on BrowsableCollection {
        id
      }
      ... on Game {
        id
      }
    }
  }
}
