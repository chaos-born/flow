#import "./StoryContentFragment.graphql"

fragment StoryFragment on Story {
  id
  creator {
    id
    stream {
      id
      viewersCount
      game {
        id
        displayName
      }
    }
    login
    displayName
    roles {
      isPartner
    }
    profileImageURL(width: 70)
    broadcastSettings {
      id
      title
    }
    lastBroadcast {
      id
      startedAt
    }
  }
  segmentType
  anchorType
  createdAt
  expiredAt
  visibilityStatus
  views
  content {
    ...StoryContentFragment
  }
  sourceType
}
