#import "./AdRequestGame.graphql"
#import "./AdRequestTag.graphql"

fragment AdRequestBroadcaster on User {
  id
  login
  adProperties {
    adServerDefault
    hasPrerollsDisabled
    hasPostrollsDisabled
    hasVodAdsEnabled
    vodArchiveMidrolls
  }
  self {
    subscriptionBenefit {
      id
      product {
        id
        hasAdFree
      }
    }
  }
  roles {
    isAffiliate
    isPartner
  }
  broadcastSettings {
    id
    isMature
  }
  stream {
    id
    broadcasterSoftware
    game {
      ...AdRequestGame
    }
    tags {
      ...AdRequestTag
    }
  }
}
