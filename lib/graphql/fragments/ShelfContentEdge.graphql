#import "./Game.graphql"
#import "./ShelfClip.graphql"
#import "./StoryPreviewFragment.graphql"
#import "./Stream.graphql"
#import "./TagFragment.graphql"
#import "./Video.graphql"

fragment ShelfContentEdge on ShelfContentEdge {
  cursor
  node {
    ...ShelfClip
    ...Video
    ...Stream
    ...Game
    ...TagFragment
    ...StoryPreviewFragment
    ... on User {
      id
    }
    ... on StoryPreview {
      id
    }
  }
  trackingID
  promotionsCampaignID
  sourceType
}
