fragment PreviewLiveShoppingOrdersFragment on PreviewLiveShoppingOrdersPayload {
  error
  result {
    charges {
      amount
      currencyCode
      displayString
      type
    }
    orders {
      id
      items {
        asin
        estimatedArrivalDate
        quantity
        title
      }
    }
    paymentMethods {
      tail
      type
    }
    purchaseID
    shippingCity
    shippingZipCode
  }
}
