#import "./ExtensionIconURLs.graphql"
#import "./ExtensionViews.graphql"

fragment CoordinatorExtension on Extension {
  authorName
  clientID
  description
  hasIdentityLinking
  iconURLs {
    ...ExtensionIconURLs
  }
  id
  isBitsEnabled
  name
  sku
  summary
  # viewerSummary isn't returned from gql. fix this
  vendorCode
  version
  views {
    ...ExtensionViews
  }
  state
  whitelistedConfigURLs
  whitelistedPanelURLs
}
