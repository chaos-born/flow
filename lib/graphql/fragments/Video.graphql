#import "./Game.graphql"
#import "./TagFragment.graphql"
#import "./User.graphql"

fragment Video on Video {
  id
  game {
    ...Game
  }
  lengthSeconds
  owner {
    ...User
  }
  previewThumbnailURL(width: 400, height: 225)
  publishedAt
  title
  viewCount
  contentTags {
    ...TagFragment
  }
}
