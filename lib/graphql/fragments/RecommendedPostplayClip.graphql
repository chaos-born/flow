#import "./RecommendedPostplayClipBroadcaster.graphql"
#import "./RecommendedPostplayGame.graphql"

fragment RecommendedPostplayClip on Clip {
  id
  durationSeconds
  slug
  title
  thumbnailURL(width: 480, height: 272)
  language
  viewCount
  broadcaster {
    ...RecommendedPostplayClipBroadcaster
  }
  game {
    ...RecommendedPostplayGame
    categorySlug: slug
  }
}
