#import "./PortraitClipCropping.graphql"

fragment ClipAssetFragment on ClipAsset {
  id
  aspectRatio
  createdAt
  creationState
  curator {
    id
    login
    displayName
    profileImageURL(width: 50)
  }
  thumbnailURL(height: 272)
  videoQualities(params: { supportedCodecs: [AVC, HEVC] }) {
    bitrate
    codecs
    duration
    height
    width
    videoCodec
    frameRate
    quality
    sourceURL
  }
  portraitMetadata {
    ...PortraitClipCropping
  }
}
