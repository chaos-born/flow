#import "./SideNavCategory.graphql"
#import "./SideNavStream.graphql"
#import "./SideNavUser.graphql"

fragment SideNavContent on ShelfContentEdge {
  cursor
  trackingID
  socialCue
  promotionsCampaignID
  label
  node {
    __typename
    ... on Stream {
      ...SideNavStream
    }
    ... on User {
      ...SideNavUser
    }
    ... on Clip {
      id
    }
    ... on Directory {
      id
    }
    ... on Game {
      ...SideNavCategory
    }
    ... on Tag {
      id
    }
    ... on Video {
      id
    }
    ... on StoryPreview {
      id
    }
  }
}
