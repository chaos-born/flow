#import "./CoreUserFragment.graphql"

fragment CoreChannelWithHomePrefsFragment on User {
  ...CoreUserFragment
  stream {
    id
  }
  bannerImageURL
  channel {
    id
    self {
      isAuthorized
      restrictionType
    }
    trailer {
      video {
        id
        self {
          viewingHistory {
            updatedAt
          }
        }
      }
    }
    home {
      preferences {
        heroPreset
      }
    }
  }
}
