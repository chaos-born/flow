#import "./ApproachingTreasureTrainDetails.graphql"
#import "./HypeTrainApproachingEventsRemaining.graphql"
#import "./HypeTrainPotentialReward.graphql"
#import "./HypeTrainReward.graphql"

fragment HypeTrainApproaching on HypeTrainApproaching {
  id
  goal
  creatorColor
  participants
  isGoldenKappaTrain
  expiresAt
  isTreasureTrain
  hypeTrainType
  treasureTrainDetails {
    ...ApproachingTreasureTrainDetails
  }
  potentialRewards {
    ...HypeTrainPotentialReward
  }
  eventsRemaining {
    ...HypeTrainApproachingEventsRemaining
  }
  levelOneRewards {
    ...HypeTrainReward
  }
}
