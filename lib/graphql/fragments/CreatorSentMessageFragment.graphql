#import "./ClipAssetFragment.graphql"

fragment CreatorSentMessageFragment on CreatorSentMessage {
  id
  body {
    ... on StoryPlainTextToken {
      plainText
    }
    ... on StoryEmoteToken {
      id
      emoteCode
    }
  }
  sentAt
  cohortType
  recipientCount
  viewCount
  clips {
    id
    slug
    title
    viewCount
    assets {
      ...ClipAssetFragment
    }
    url
    curator {
      id
      displayName
    }
  }
}
