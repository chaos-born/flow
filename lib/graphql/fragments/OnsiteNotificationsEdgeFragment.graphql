#import "./OnsiteNotificationsEdgeExtraFragment.graphql"

fragment OnsiteNotificationsEdgeFragment on OnsiteNotificationEdge {
  cursor
  node {
    id
    type
    body
    renderStyle
    createdAt
    updatedAt
    isRead
    thumbnailURL
    actions {
      id
      label
      modalID
      body
      type
      url
    }
    displayType
    category
    aggregationType
    collapseKey
    destinationType
    isMobileOnly
    dataBlocks {
      id
      label
      content {
        ... on OnsiteNotificationTextBlock {
          body
        }
      }
    }
    extra {
      ...OnsiteNotificationsEdgeExtraFragment
    }
  }
}
