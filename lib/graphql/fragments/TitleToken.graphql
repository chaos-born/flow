#import "./ShelfTitleGame.graphql"

fragment TitleToken on TitleTokenEdge {
  node {
    ... on Game {
      ...ShelfTitleGame
    }
    ... on TextToken {
      text
      hasEmphasis
      location
      hyperlinkURL
    }
    ... on User {
      id
      login
      nameForDisplay: displayName
    }
    ... on Tag {
      id
      tagName
    }
    ... on IntegerToken {
      value
    }
    ... on DateToken {
      time
    }
    ... on BrowsableCollection {
      id
      slug
      collectionName: name {
        fallbackLocalizedTitle
      }
    }
  }
}
