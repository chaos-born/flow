fragment FeedContentFragmentPostPlay on FeedClip {
  content {
    id
    slug
    url
    title
    viewCount
    language
    curator {
      id
      login
      displayName
    }
    game {
      id
      name
      displayName
      categorySlug: slug
    }
    broadcaster {
      id
      login
      displayName
    }
    thumbnailURL(width: 480, height: 272)
    createdAt
    durationSeconds
    previewThumbnailProperties {
      blurReason
    }
  }
}
