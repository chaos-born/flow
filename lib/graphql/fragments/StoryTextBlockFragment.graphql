#import "./StoryLayerPlacementFragment.graphql"
#import "./StoryTextTokenFragment.graphql"

fragment StoryTextBlockFragment on StoryTextBlock {
  textTokens {
    ...StoryTextTokenFragment
  }
  textBoxWidth
  style {
    color
    font
    isBold
    isItalic
  }
  placement {
    ...StoryLayerPlacementFragment
  }
  assetURL
}
