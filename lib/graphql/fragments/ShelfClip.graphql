#import "./Game.graphql"
#import "./GuestStarUser.graphql"
#import "./User.graphql"

fragment ShelfClip on Clip {
  id
  slug
  url
  embedURL
  clipTitle: title
  clipViewCount: viewCount
  curator {
    ...User
  }
  game {
    ...Game
  }
  broadcaster {
    ...User
  }
  thumbnailURL(width: 480, height: 272)
  clipCreatedAt: createdAt
  durationSeconds
  language
  champBadge {
    id
  }
  isFeatured
  isAutoCurated
  guestStarParticipants {
    host {
      ...GuestStarUser
    }
    guests {
      ...GuestStarUser
    }
    sessionIdentifier
  }
}
