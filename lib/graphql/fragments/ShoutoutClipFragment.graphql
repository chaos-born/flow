#import "./ClipAssetFragment.graphql"

fragment ShoutoutClipFragment on Clip {
  id
  slug
  title
  viewCount
  createdAt
  curator {
    id
    displayName
  }
  assets {
    ...ClipAssetFragment
  }
  game {
    id
    name
  }
  playbackAccessToken(params: { platform: "web", playerType: "clips-download" }) {
    signature
    value
  }
  videoQualities {
    sourceURL
  }
}
