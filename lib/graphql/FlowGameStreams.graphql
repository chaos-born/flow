query FlowGameStreams($id: ID, $first: Int, $after: Cursor) {
  game(id: $id) {
    streams(first: $first, after: $after) {
      edges {
        cursor
        node {
          id
          broadcaster {
            id
            login
            displayName
            profileImageURL(width: 300)
            broadcastSettings {
              title
            }
          }
          createdAt
          freeformTags {
            name
          }
          game {
            id
            displayName
          }
          previewImageURL
          viewersCount
        }
      }
      pageInfo {
        hasNextPage
      }
    }
  }
}
