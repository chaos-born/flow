#import "../fragments/BroadcasterInfo.graphql"
#import "../fragments/ContentClassificationLabelFields.graphql"
#import "../fragments/ContentClassificationLabelPoliciesFields.graphql"
#import "../fragments/GameTrackingFields.graphql"

query ContentClassificationContext ($login: String, $clipSlug: ID!, $vodID: ID, $isStream: Boolean!, $isVOD: Boolean!, $isClip: Boolean!) {
  user(login: $login) @include(if: $isStream) {
    id
    stream {
      id
      game {
        ...GameTrackingFields
      }
      contentClassificationLabels {
        ...ContentClassificationLabelFields
      }
      contentClassificationLabelPolicyProperties {
        ...ContentClassificationLabelPoliciesFields
      }
    }
    ...BroadcasterInfo
  }
  video(id: $vodID) @include(if: $isVOD) {
    id
    broadcastType
    game {
      ...GameTrackingFields
    }
    owner {
      ...BroadcasterInfo
    }
    contentClassificationLabels {
      ...ContentClassificationLabelFields
    }
    contentClassificationLabelPolicyProperties {
      ...ContentClassificationLabelPoliciesFields
    }
  }
  clip(slug: $clipSlug) @include(if: $isClip) {
    id
    slug
    broadcaster {
      ...BroadcasterInfo
    }
    game {
      ...GameTrackingFields
    }
    contentClassificationLabels {
      ...ContentClassificationLabelFields
    }
    contentClassificationLabelPolicyProperties {
      ...ContentClassificationLabelPoliciesFields
    }
  }
}
