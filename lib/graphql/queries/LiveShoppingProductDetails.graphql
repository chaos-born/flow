query LiveShoppingProductDetails ($asin: String!, $liveShoppingSessionID: ID!) {
  liveShoppingProductDetails(input: { asin: $asin, liveShoppingSessionID: $liveShoppingSessionID }) {
    error
    isAuthenticated
    productDetails {
      altText
      asin
      availabilityPrimaryMessage
      availabilitySupplementaryMessage
      availabilityType
      conditionsOfUseURL
      currencyCode
      dealDiscountPercentage
      dealType
      deliveryMessage
      descriptions
      imageList {
        height
        url
        width
      }
      isPrime
      merchantID
      offerID
      price
      primeBadgeAltText
      privacyPolicyURL
      productDetailPageURL
      returnPolicyURL
      sellerName
      shipperName
      title
      variationDimensions {
        name
        values
      }
      variations {
        asin
        dimensionValueIndexes
      }
    }
    sessionToken
  }
}
