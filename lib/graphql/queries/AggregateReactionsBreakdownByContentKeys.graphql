#import "../fragments/AggregateReactionsBreakdownByContentKeyFragment.graphql"

query aggregateReactionsBreakdownByContentKeys ($contentKeys: [ReactionsContentKey!]!) {
  aggregateReactionsBreakdownByContentKeys(contentKeys: $contentKeys) {
    totals {
      ...AggregateReactionsBreakdownByContentKeyFragment
    }
    error {
      code
    }
  }
}
