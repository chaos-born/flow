query ChallengeParticipants(
    $extensionID: ID!
    $extensionVersion: String
    $conditionOwnerID: ID!
    $conditionParticipantOwnerID: ID!
    $participantsAfter: Cursor
) {
    extension(id: $extensionID, version: $extensionVersion) {
      id
      challengeConditionParticipants(
        after: $participantsAfter
        input:{
          endState: PENDING
          conditionOwnerID: $conditionOwnerID
          conditionParticipantOwnerID: $conditionParticipantOwnerID
        })
      {
        pageInfo{
          hasNextPage
          hasPreviousPage
        }
        edges{
          node {
            id
            endState
            processingState
            condition {
              id
            }
          }
          cursor
        }
      }
    }
  }
