#import "../fragments/CoreChannelWithHomePrefsFragment.graphql"

query ChannelShell ($login: String!) {
  userOrError: userResultByLogin(login: $login) {
    ...CoreChannelWithHomePrefsFragment
    ... on UserDoesNotExist {
      userDoesNotExist: key
      reason
    }
    ... on UserError {
      userError: key
    }
  }
}
