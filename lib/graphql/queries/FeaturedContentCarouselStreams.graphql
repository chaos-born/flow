#import "../fragments/FreeformTagFragment.graphql"

query FeaturedContentCarouselStreams ($language: String, $first: Int, $acceptedMature: Boolean) {
  featuredStreams(language: $language, first: $first, acceptedMature: $acceptedMature) {
    itemTrackingID
    isScheduled
    isSponsored
    priorityLevel
    sourceType
    description
    stream {
      broadcaster {
        displayName
        id
        profileImageURL(width: 150)
        login
      }
      game {
        id
        slug
        name
        displayName
      }
      id
      type
      viewersCount
      previewImageURL(width: 320, height: 180)
      verticalPreviewImageURL: previewImageURL(height: 320, width: 180)
      height
      width
      isDualFormat
      freeformTags {
        ...FreeformTagFragment
      }
    }
    title
    version
  }
}
