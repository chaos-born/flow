query AllCostreamersDiscoveryQuery ($channelLogin: String!, $first: Int = 10, $cursor: Cursor) {
  user(login: $channelLogin) {
    id
    stream {
      id
      costreamDetails {
        allCostreamers(first: $first, after: $cursor) {
          edges {
            cursor
            node {
              id
              profileImageURL(width: 70)
              login
              displayName
              stream {
                id
                viewersCount
              }
            }
          }
          cursor
          pageInfo {
            hasPreviousPage
            hasNextPage
          }
        }
      }
    }
  }
}
