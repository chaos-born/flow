query VideoPlayerStreamInfoOverlayClip ($slug: ID!) {
  clip(slug: $slug) {
    id
    title
    slug
    broadcaster {
      id
      login
      displayName
      profileURL
      profileImageURL(width: 150)
      roles {
        isPartner
      }
    }
    game {
      id
      displayName
      name
      slug
    }
    viewCount
  }
}
