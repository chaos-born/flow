query VideoPlayerSettingsWithClipMetadata ($slug: ID!, $isCommunityMomentsFeatureEnabled: Boolean!) {
  clip(slug: $slug) {
    id
    broadcaster {
      id
    }
    curator {
      id
    }
    communityMoment @include(if: $isCommunityMomentsFeatureEnabled) {
      id
    }
  }
  currentUser {
    id
    roles {
      isSiteAdmin
    }
  }
}
