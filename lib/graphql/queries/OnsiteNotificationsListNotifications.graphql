#import "../fragments/OnsiteNotificationsEdgeFragment.graphql"

query OnsiteNotifications_ListNotifications ($limit: Int, $cursor: Cursor, $language: String, $displayType: OnsiteNotificationDisplayType, $shouldLoadLastBroadcast: Boolean = false) {
  currentUser {
    id
    lastBroadcast @include(if: $shouldLoadLastBroadcast) {
      id
    }
    notifications(first: $limit, after: $cursor, language: $language, displayType: $displayType) {
      pageInfo {
        hasNextPage
      }
      edges {
        ...OnsiteNotificationsEdgeFragment
      }
    }
  }
}
