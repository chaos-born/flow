#import "../fragments/SocialMedia.graphql"
#import "../fragments/UserBioVideo.graphql"

query ChannelRoot_AboutPanel ($channelLogin: String!, $skipSchedule: Boolean!) {
  currentUser {
    id
    login
  }
  user(login: $channelLogin) {
    id
    description
    displayName
    primaryColorHex
    profileImageURL(width: 300)
    followers {
      totalCount
    }
    roles {
      isPartner
      isAffiliate
      isStaff
      isParticipatingDJ
    }
    channel {
      id
      socialMedias {
        ...SocialMedia
      }
      schedule @skip(if: $skipSchedule) {
        id
        nextSegment {
          id
          startAt
          hasReminder
        }
      }
    }
    lastBroadcast {
      id
      game {
        id
        displayName
      }
    }
    primaryTeam {
      id
      name
      displayName
    }
    videos(first: 30, sort: TIME, type: ARCHIVE) {
      edges {
        ...UserBioVideo
      }
    }
  }
}
