query VideoPlayerMediaSessionManager ($channel: String, $isLive: Boolean!, $isVodOrCollection: Boolean!, $vodID: ID!, $isClip: Boolean!, $clipSlug: ID!) {
  user(login: $channel) @include(if: $isLive) {
    id
    displayName
    login
    profileImageURL(width: 150)
    broadcastSettings @include(if: $isLive) {
      id
      title
    }
  }
  video(id: $vodID) @include(if: $isVodOrCollection) {
    id
    title
    owner {
      id
      displayName
      login
      profileImageURL(width: 150)
    }
  }
  clip(slug: $clipSlug) @include(if: $isClip) {
    id
    title
    broadcaster {
      id
      displayName
      login
      profileImageURL(width: 150)
    }
  }
}
