#import "../fragments/CheermoteGroup.graphql"

query BitsConfigContext_Channel ($login: String!) {
  channel: user(login: $login) {
    id
    cheer {
      id
      cheerGroups {
        ...CheermoteGroup
      }
      isBitsEnabled
      settings {
        id
        cheerMinimumBits
        emoteMinimumBits
      }
    }
  }
}
