#import "../fragments/ReactionAssetMetadataFragment.graphql"

query availableReactionsByContentType ($contentType: ReactionsContentType!, $channelID: ID) {
  availableReactionsByContentType(contentType: $contentType, channelID: $channelID) {
    reactions {
      ...ReactionAssetMetadataFragment
    }
    error {
      code
    }
  }
}
