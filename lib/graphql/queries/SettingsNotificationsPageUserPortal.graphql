#import "../fragments/NotificationSettingFragment.graphql"
#import "../fragments/NotificationSettingsFollowEdge.graphql"

query SettingsNotificationsPage_User_Portal ($limit: Int, $cursor: Cursor, $followedFilters: [NotificationEnrollmentFilter!], $sortOrder: SortOrder) {
  currentUser {
    id
    notificationSettings {
      ...NotificationSettingFragment
    }
    notificationEnrollmentFollows(first: $limit, after: $cursor, filters: $followedFilters, order: $sortOrder) {
      totalCount
      edges {
        ...NotificationSettingsFollowEdge
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
