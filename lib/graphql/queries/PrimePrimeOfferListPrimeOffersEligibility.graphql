query Prime_PrimeOfferList_PrimeOffers_Eligibility ($dateOverride: Time, $countryCode: String) {
  primeOffersWithEligibility(dateOverride: $dateOverride, countryCode: $countryCode) {
    id
    catalogOfferID
    title
    gameTitle
    imageURL
    claimInstructions
    description
    deliveryMethod
    endTime
    priority
    tags
    content {
      externalURL
      publisher
      categories
      ctaType
      ctaText
      subtitleSubtext
      shortDescription
    }
    offerEligibility {
      canClaim
      isClaimed
      offerState
    }
  }
}
