query PrefetchPlaybackAccessToken ($login: String!, $playerType: String!, $platform: String!) {
  streamPlaybackAccessToken(channelName: $login, params: { platform: $platform, playerBackend: "mediaplayer", playerType: $playerType }) {
    value
    signature
    expiresAt
    authorization {
      isForbidden
      forbiddenReasonCode
    }
  }
}
