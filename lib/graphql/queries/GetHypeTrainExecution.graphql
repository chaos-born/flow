#import "../fragments/HypeTrainApproaching.graphql"
#import "../fragments/HypeTrainExecution.graphql"

query GetHypeTrainExecution ($userLogin: String!) {
  user(login: $userLogin) {
    id
    displayName
    channel {
      id
      hypeTrain {
        execution {
          ...HypeTrainExecution
        }
        approaching {
          ...HypeTrainApproaching
        }
      }
    }
  }
}
