#import "../fragments/ActivityFeedEvent.graphql"

query ActivityListContextV2Query ($channelID: ID!, $limit: Int!, $cursor: Cursor) {
  channel(id: $channelID) {
    id
    activityFeed {
      events(first: $limit, after: $cursor) {
        edges {
          node {
            ...ActivityFeedEvent
          }
          cursor
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
        }
      }
    }
  }
}
