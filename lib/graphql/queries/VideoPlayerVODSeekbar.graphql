#import "../fragments/VideoMutedSegment.graphql"

query VideoPlayer_VODSeekbar ($vodID: ID, $includePrivate: Boolean = false) {
  video(id: $vodID, options: { includePrivate: $includePrivate }) {
    id
    lengthSeconds
    muteInfo {
      mutedSegmentConnection {
        nodes {
          ...VideoMutedSegment
        }
      }
    }
  }
}
