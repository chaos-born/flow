#import "../fragments/FeedContentFragmentPostPlay.graphql"

query VideoPlayerClipPostplayRecommendationsOverlay__recs ($limit: Int, $requestID: ID!, $sessionID: ID!, $clientApp: String!, $location: String!) {
  feedItems(input: { context: { platform: "web", clientApp: $clientApp, pageviewLocation: $location }, sessionID: $sessionID, requestID: $requestID, feedLocation: CLIPS, ingress: BROWSE_CATEGORY_CLIP, limit: $limit }) {
    id
    edges {
      id
      cursor
      node {
        ...FeedContentFragmentPostPlay
      }
    }
    recommendedLimit
    isEndOfContent
  }
}
