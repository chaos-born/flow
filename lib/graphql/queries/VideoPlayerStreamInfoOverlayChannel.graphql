query VideoPlayerStreamInfoOverlayChannel ($channel: String) {
  user(login: $channel) {
    id
    profileURL
    displayName
    login
    profileImageURL(width: 150)
    roles {
      isPartner
    }
    broadcastSettings {
      id
      title
      game {
        id
        displayName
        name
        slug
      }
    }
    stream {
      id
      viewersCount
      tags {
        id
        localizedName
      }
    }
  }
}
