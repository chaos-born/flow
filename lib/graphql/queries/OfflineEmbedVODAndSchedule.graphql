query OfflineEmbedVODAndSchedule ($login: String!) {
  user(login: $login) {
    id
    displayName
    bannerImageURL
    offlineImageURL
    primaryColorHex
    channel {
      id
      schedule {
        id
        segmentList {
          edges {
            node {
              id
              title
              startAt
              endAt
              hasReminder
              isCancelled
              categories {
                id
                name
                boxArtURL(width: 144, height: 192)
              }
            }
          }
        }
      }
    }
    videos(first: 1) {
      edges {
        node {
          id
          title
          previewThumbnailURL(width: 320, height: 180)
          game {
            id
            name
          }
        }
      }
    }
  }
}
