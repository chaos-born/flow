#import "../fragments/PendingSubscription.graphql"
#import "../fragments/SubCommunityGiftingFragment.graphql"
#import "../fragments/SubProductOfferFragment.graphql"
#import "../fragments/Tenure.graphql"

query ChannelPage_SubscribeButton_User ($login: String!, $includeExpiredDunning: Boolean) {
  user(login: $login) {
    id
    displayName
    primaryColorHex
    subscriptionProducts {
      id
      emoteSetID
      name
      hasAdFree
      tier
      offers {
        ...SubProductOfferFragment
      }
      gifting {
        ...SubCommunityGiftingFragment
      }
    }
    self {
      canPrimeSubscribe
      cumulativeTenure: subscriptionTenure(tenureMethod: CUMULATIVE) {
        ...Tenure
      }
      follower {
        disableNotifications
      }
      subscriptionBenefit(includeExpiredDunning: $includeExpiredDunning) {
        id
        purchasedWithPrime
        tier
        endsAt
        isDNRd
        platform
        pendingSubscription {
          ...PendingSubscription
        }
        gift {
          isGift
        }
        dunningPeriodEndsAt
      }
    }
  }
  requestInfo {
    countryCode
  }
}
