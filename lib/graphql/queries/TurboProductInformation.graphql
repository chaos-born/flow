#import "../fragments/SubProductOfferFragment.graphql"
#import "../fragments/TurboProductOfferFragment.graphql"

query TurboProductInformation ($name: String!, $tplr: String = "turbo_standard_gift") {
  subscriptionProduct(productName: $name) {
    id
    offers {
      ...TurboProductOfferFragment
    }
    gifting {
      standard(tplr: $tplr) {
        offer {
          ...SubProductOfferFragment
        }
      }
    }
    self {
      benefit {
        id
        states {
          state
          createdAt
        }
        renewsAt
        pendingSubscription {
          startsAt
        }
      }
    }
  }
}
