#import "../fragments/CurrentUserWhisperThreadsNode.graphql"

query Whispers_Whispers_UserWhisperThreads ($cursor: Cursor) {
  currentUser {
    id
    login
    whisperSettings {
      isWhispersDisabledByParent
    }
    whisperThreads(first: 10, after: $cursor) {
      edges {
        cursor
        node {
          ...CurrentUserWhisperThreadsNode
        }
        __typename
      }
      __typename
    }
  }
}
