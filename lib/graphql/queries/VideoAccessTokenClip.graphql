#import "../fragments/ClipAssetFragment.graphql"
#import "../fragments/VideoAccessTokenClipQuality.graphql"

query VideoAccessToken_Clip ($slug: ID!, $platform: String!) {
  clip(slug: $slug) {
    id
    playbackAccessToken(params: { platform: $platform, playerType: "clips-viewing" }) {
      signature
      value
    }
    videoQualities {
      ...VideoAccessTokenClipQuality
    }
    assets {
      ...ClipAssetFragment
    }
  }
}
