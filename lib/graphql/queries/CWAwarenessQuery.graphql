#import "../fragments/SpendableBalance.graphql"

query CWAwarenessQuery ($channelName: String!) {
  channel: user(login: $channelName) {
    id
    roles {
      isAffiliate
      isPartner
      isPreAffiliate
    }
    payout {
      threshold {
        previousMonthAccrual {
          earnedAmount {
            nanos
            units
            currencyCode
          }
        }
      }
    }
  }
  spendableBalance {
    ...SpendableBalance
  }
}
