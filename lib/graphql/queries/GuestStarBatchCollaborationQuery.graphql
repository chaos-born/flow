#import "../fragments/GuestStarChannelCollab.graphql"

query GuestStarBatchCollaborationQuery ($options: GuestStarChannelCollaborationOptions, $canDropInFlagEnabled: Boolean!, $openCallingFlagEnabled: Boolean!) {
  guestStarChannelCollaboration(options: $options) {
    ...GuestStarChannelCollab
  }
  guestStarCollaborationStatuses(options: $options) @include(if: $openCallingFlagEnabled) {
    shouldRefetch
    shouldSubscribeToUpdates
    channelCollabs {
      ...GuestStarChannelCollab
    }
  }
}
