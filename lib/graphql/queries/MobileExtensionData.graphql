query MobileExtensionData($channelID: ID!, $extensionID: ID!, $version: String) {
  mobileExtensionInstallation(channelID: $channelID, extensionID: $extensionID, version: $version) {
    installation {
      id
      extension {
        id
        name
        authorName
        isBitsEnabled
        clientID
        description
        iconURLs {
          square24
          square100
        }
        hasIdentityLinking
        sku
        summary
        version
        views {
          mobile {
            viewerURL
          }
        }
        vendorCode
        state
        whitelistedConfigURLs
        whitelistedPanelURLs
      }
      activationConfig {
        anchor
      }
			abilities {
				isBitsEnabled
				isChatEnabled
				isSubscriptionStatusAvailable
			}
    }
    token {
      jwt
    }
    helixToken {
      jwt
    }
    configuration {
      broadcaster {
        content
        version
      }
      developer {
        content
        version
      }
      global {
        content
        version
      }
    }
  }
}
