#import "../fragments/CoreChannelFragment.graphql"

query ChannelCollectionCore ($collectionID: ID!) {
  collection(id: $collectionID) {
    id
    owner {
      ...CoreChannelFragment
    }
    items(first: 1) {
      edges {
        node {
          ... on Video {
            id
          }
        }
      }
    }
  }
}
