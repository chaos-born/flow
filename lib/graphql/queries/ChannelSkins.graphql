#import "../fragments/ChannelSkinsAdsAudiencePolicy.graphql"
#import "../fragments/ChannelSkinsPlacement.graphql"

query ChannelSkins ($channelLogin: String, $channelID: ID, $skipSubSub: Boolean!, $skipSubSubProgress: Boolean!, $skipGiftSubMatch: Boolean!, $sponsorshipsParams: SponsorshipsParams) {
  channel(name: $channelLogin, id: $channelID) {
    id
    sponsorships(sponsorshipsParams: $sponsorshipsParams) {
      channelSkin {
        adsAudiencePolicy {
          ...ChannelSkinsAdsAudiencePolicy
        }
        advertiser {
          ctaMessage
          ctaURL
        }
        placements {
          ...ChannelSkinsPlacement
        }
        activation {
          id
          version
        }
        activationProgression
        campaign
        nextDisableAt
        campaignInstance {
          id
          displayRef
          clickRef
          transparencyInfo {
            adIDValue
            adProgramIDValue
            creativeIDValue
            slotName
            version
            advertiserIDNS
            campaignIDNS
            geoCode
            selectionSignals {
              isShownBasedOffUserDsaContext
              isShownBasedOffUserDsaLocation
              dsaPastActivity
            }
          }
          advertiser {
            name
            imageAsset {
              lightModeURL
              darkModeURL
            }
            colorHexCode
          }
        }
      }
      subsidizedSubscriptions @skip(if: $skipSubSub) {
        activation {
          id
          endsAt
          version
        }
        activationProgression
        campaign
        userProgressLimits {
          type
          value
        }
        nextDisableAt
        campaignInstance {
          id
          advertiser {
            name
            imageAsset {
              lightModeURL
              darkModeURL
            }
            colorHexCode
          }
        }
        self {
          id
          progress(type: SUBD_GIFT_SUBS_WEB) @skip(if: $skipSubSubProgress) {
            amount
          }
        }
        communityProgress {
          current
          target
        }
      }
      giftSubMatch @skip(if: $skipGiftSubMatch) {
        activation {
          id
          endsAt
          version
        }
        activationProgression
        campaign
        nextDisableAt
        campaignInstance {
          id
          advertiser {
            name
            imageAsset {
              lightModeURL
              darkModeURL
            }
            colorHexCode
          }
        }
        communityProgress {
          current
          target
          isUnlimited
        }
        channelProgress {
          current
          target
        }
      }
    }
  }
  user(login: $channelLogin, id: $channelID) {
    id
    displayName
    profileImageURL(width: 70)
    login
    primaryColorHex
    stream {
      id
      game {
        id
        displayName
      }
    }
  }
  currentUser {
    id
  }
  requestInfo {
    countryCodeAlpha2
  }
}
