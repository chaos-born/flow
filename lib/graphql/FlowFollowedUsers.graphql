query FlowFollowedUsers($first: Int, $after: Cursor) {
  currentUser {
    follows(first: $first, after: $after, order: ASC) {
      edges {
        cursor
        followedAt
        node {
          id
          login
          displayName
          profileImageURL(width: 300)
        }
      }
      pageInfo {
        hasNextPage
      }
    }
  }
}
