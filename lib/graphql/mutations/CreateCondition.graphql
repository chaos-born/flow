mutation CreateCondition(
    $extensionID: ID!
    $extensionInstallationChannelID: ID!
    $disableWhenSatisfied: Boolean!
    $name: String!
) {
    createBitsChallengeConditionForExtension(input: {
        disableWhenSatisfied: $disableWhenSatisfied
        name: $name
        extensionID: $extensionID
        extensionInstallationChannelID: $extensionInstallationChannelID
    }) {
        condition {
            id
            state
            name
            createdAt
            updatedAt
        }
    }
}
