mutation SetExtensionConfiguration(
  $channelID: ID!
  $extensionID: ID!
  $version: String!
  $content: String!
) {
  setExtensionConfiguration(input: {
    channelID: $channelID
    extensionID: $extensionID
    configVersion: $version
    content: $content
  }) {
    channelID
    extensionID
    configVersion
    content
    error {
      code
    }
  }
}
