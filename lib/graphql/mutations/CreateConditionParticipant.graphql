mutation CreateConditionParticipant(
    $extensionID: ID!
    $conditionID: ID!
    $conditionOwnerID: ID!
    $bitsAmount: Int!
    $ttlSeconds: Int!
) {
  createBitsChallengeConditionParticipantForExtension(input: {
    conditionID: $conditionID
    conditionOwnerID: $conditionOwnerID
    bitsAmount: $bitsAmount
    ttlSeconds: $ttlSeconds
    extensionID: $extensionID
  }) {
    conditionParticipant {
      id
      endState
      processingState
    }
  }
}
