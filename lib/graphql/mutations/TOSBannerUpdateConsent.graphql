#import "../fragments/UserConsent.graphql"

mutation TOS_Banner_Update_Consent ($userID: ID!, $update: [UserProductConsentInput!]!) {
  updateUserProductConsent(input: { userID: $userID, productConsentUpdate: $update }) {
    user {
      id
      productConsent {
        ... on ProductConsentError {
          code
        }
        ... on UserConsent {
          ...UserConsent
        }
      }
    }
    errorCode
  }
}
