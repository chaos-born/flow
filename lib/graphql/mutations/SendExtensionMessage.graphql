mutation SetExtensionConfiguration(
  $extensionID: ID!
  $channelID: ID!
  $contentType: String!
  $authToken: String!
  $message: String!
  $targets: [String!]!
) {
  sendExtensionMessage(input: {
    extensionID: $extensionID,
    channelID: $channelID,
    contentType: $contentType,
    extAuthToken: $authToken,
    message: $message,
    targets: $targets,
  }) {
    error {
      code
    }
    rateLimitsApplied {
      isLimitExceeded
      limit
      rateLimiterName
      remainingQuota
      resetsAt
    }
  }
}
