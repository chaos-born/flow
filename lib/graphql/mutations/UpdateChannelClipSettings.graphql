mutation UpdateChannelClipSettings ($input: UpdateChannelClipsSettingInput!) {
  updateChannelClipsSetting(input: $input) {
    channel {
      id
      clipsSettings {
        isClipsCreationEnabled
        creationRestrictedTo {
          isFollower
          isSubscriber
        }
        creationRestrictionOptions {
          followingLengthMinutes
        }
        categoryBlocklist {
          id
          name
          displayName
          boxArtURL(width: 40, height: 55)
        }
        isViewerExportingEnabled
        hasAcknowledgedViewerExportsLegalDisclosure
        isClipCreationDefaultNewTabEnabled
        isClipsFeatureToggleDefaultEnabled
        featuringRestrictedTo {
          shouldAllowMods
        }
        discoverySetting
        isAutoClipsEnabled
        isAutopubRecapsEnabled
        isViewerCaptionsEnabled
        isClipThatCaptionsEnabled
      }
    }
  }
}
