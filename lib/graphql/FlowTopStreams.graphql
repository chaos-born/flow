query FlowTopStreams($first: Int, $after: Cursor) {
  streams(first: $first, after: $after) {
    edges {
      cursor
      node {
        id
        broadcaster {
          id
          login
          displayName
          profileImageURL(width: 300)
          broadcastSettings {
            title
          }
        }
        createdAt
        freeformTags {
          name
        }
        game {
          id
          displayName
        }
        previewImageURL
        viewersCount
      }
    }
    pageInfo {
      hasNextPage
    }
  }
}
